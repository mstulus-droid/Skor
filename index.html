<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101722">
  <title>Rhadzor ScoreBoard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-bg" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="topbar">
      <button id="soundToggle" class="btn ghost">Sound ON</button>
      <button id="undoBtn" class="btn ghost">Undo</button>
      <button id="resetBtn" class="btn danger">Reset Match</button>
    </header>

    <section class="board" aria-label="Score board">
      <article class="team team-a" id="teamA" data-team="A">
        <div class="team-head">
          <button id="pickTeamA" class="logo-pick" aria-label="Pilih team kiri">
            <img id="logoA" class="team-logo" src="Almodo2.webp" alt="Logo Player A">
          </button>
        </div>
        <p id="scoreA" class="score">0</p>
      </article>

      <section class="countdown-panel" aria-label="Countdown">
        <div class="countdown-top">
          <p id="countdownTitle" class="countdown-title">Countdown</p>
          <p id="vsMark" class="vs-mark" aria-hidden="true">VS</p>
        </div>
        <button id="timerBtn" class="timer-display" aria-label="Mulai atau jeda countdown">01:30</button>
        <div id="timerControls" class="timer-controls">
          <button id="minus10Btn" class="btn ghost small">-10s</button>
          <button id="plus10Btn" class="btn ghost small">+10s</button>
          <button id="timerResetBtn" class="btn ghost small">Reset</button>
        </div>
      </section>

      <article class="team team-b" id="teamB" data-team="B">
        <div class="team-head">
          <button id="pickTeamB" class="logo-pick" aria-label="Pilih team kanan">
            <img id="logoB" class="team-logo" src="Mechabara.webp" alt="Logo Player B">
          </button>
        </div>
        <p id="scoreB" class="score">0</p>
      </article>
    </section>

    <p id="rotateHint" class="rotate-hint">Untuk hasil terbaik, gunakan mode landscape.</p>
  </main>

  <div id="teamPickerModal" class="picker-modal" hidden>
    <div id="pickerBackdrop" class="picker-backdrop"></div>
    <section class="picker-panel" role="dialog" aria-modal="true" aria-label="Pilih team">
      <h3 class="picker-title">Pilih Team</h3>
      <div id="pickerOptions" class="picker-options"></div>
      <button id="closePickerBtn" class="btn ghost">Tutup</button>
    </section>
  </div>

  <!-- Winner Overlay -->
  <canvas id="confettiCanvas" hidden></canvas>
  <div id="winnerOverlay" class="winner-overlay" hidden>
    <div class="winner-content">
      <h2 class="winner-title">🏆 PEMENANG 🏆</h2>
      
      <!-- Big Winner Logo -->
      <div class="winner-logo-container">
        <img id="winnerLogoBig" class="winner-logo-big" src="" alt="Winner Logo">
      </div>
      
      <div class="winner-result">
        <div class="winner-team-info">
          <img id="winnerLogoA" class="winner-team-logo" src="" alt="Logo Team A">
          <span id="winnerScoreA" class="winner-team-score">0</span>
        </div>
        <span class="winner-vs">VS</span>
        <div class="winner-team-info">
          <img id="winnerLogoB" class="winner-team-logo" src="" alt="Logo Team B">
          <span id="winnerScoreB" class="winner-team-score">0</span>
        </div>
      </div>
      
      <div class="winner-buttons">
        <button id="playAgainBtn" class="btn primary winner-btn">🎮 Main Lagi</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
